# scow-slurm-adapter-login：entrypoint 需要的环境变量（与 config.yaml.tmpl 对应）。
# 使用方式：
#   cp secret-adapter-env.example.yaml secret-adapter-env.yaml
#   编辑 secret-adapter-env.yaml 填入真实值（secret-adapter-env.yaml 已加入 .gitignore，勿提交）
#   kubectl apply -f secret-adapter-env.yaml
#
# 再 apply deployment.yaml（已配置 envFrom 引用本 Secret）。
apiVersion: v1
kind: Secret
metadata:
  name: scow-slurm-adapter-env
  namespace: slurm
type: Opaque
stringData:
  DB_PASSWORD: "CHANGEME"
  MYSQL_HOST: "172.16.84.71"
  MYSQL_PORT: "3306"
  MYSQL_USER: "slurm"
  MYSQL_DBNAME: "slurm_acct_db"
  MYSQL_CLUSTERNAME: "slurm_slurm"
  MYSQL_DATABASE_ENCODE: "utf8"
