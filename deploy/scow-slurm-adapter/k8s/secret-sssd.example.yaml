# 示例骨架：LDAPS + CA（Pod 内路径 /etc/sssd/ldap-ca/ca.crt）。
# 真实环境请从登录节点复制 sssd.conf，并用命令创建 Secret（勿提交密码）：
#
#   kubectl create secret generic scow-slurm-adapter-sssd \
#     --namespace=slurm \
#     --from-file=sssd.conf=./sssd.conf
#
# CA 单独 Secret：
#   kubectl create secret generic scow-slurm-adapter-ldap-ca \
#     --namespace=slurm \
#     --from-file=ca.crt=./ldap-ca.crt
apiVersion: v1
kind: Secret
metadata:
  name: scow-slurm-adapter-sssd
type: Opaque
stringData:
  sssd.conf: |
    [sssd]
    config_file_version = 2
    services = nss, pam
    domains = ldap

    [nss]
    filter_groups = root
    filter_users = root

    [pam]

    [domain/ldap]
    id_provider = ldap
    auth_provider = ldap
    chpass_provider = none

    ldap_uri = ldaps://YOUR-LDAP:636
    ldap_search_base = dc=example,dc=com
    ldap_default_bind_dn = cn=readonly,dc=example,dc=com
    ldap_default_authtok_type = password
    ldap_default_authtok = YOUR_BIND_PASSWORD

    ldap_user_search_base = ou=people,dc=example,dc=com
    ldap_group_search_base = ou=groups,dc=example,dc=com

    ldap_id_use_start_tls = false
    ldap_tls_cacert = /etc/sssd/ldap-ca/ca.crt
    ldap_tls_reqcert = demand

    cache_credentials = false
    enumerate = false
