# 是否启用作业管理功能
jobManagement: true

# 是否启用交互式任务功能
apps: true

loginDesktop:
  # 是否启用桌面功能。未在登录节点安装 TurboVNC、或未打通 MIS→login 的 root SSH 时，
  # /api/desktop/listDesktops 会 500；本模板默认关闭，需要图形桌面时再改为 true 并满足上述条件。
  enabled: false

  # 桌面
  wms:
    - name: Xfce
      wm: xfce

# TurboVNC的安装路径
turboVNCPath: /opt/TurboVNC

# 主页标题
homeTitle:
  defaultText: "Super Computing on Web"

# 主页文本
homeText:
  defaultText: "SCOW"

# 是否启用终端功能
shell: true

# 提交作业的默认工作目录。使用{{ name }}代替作业名称。相对于用户的家目录
submitJobDefaultPwd: slurm/jobs/{{ name }}

# 将保存的作业保存到什么位置。相对于用户家目录
savedJobsDir: slurm/savedJobs

# 将交互式任务的信息保存到什么位置。相对于用户的家目录
appJobsDir: slurm/appData

#将创建的登录节点桌面信息的保存到什么位置。相对于用户的家目录
loginDesktop.desktopsDir: slurm/desktops

#提交交互式应用上一次填写信息的默认工作目录。相对于用户的家目录
appLastSubmissionDir: slurm/apps
